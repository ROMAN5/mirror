<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirror Trading Manager</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #111827, #1f2937);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            max-width: 700px;
        }

        h1 {
            font-size: 42px;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }

        p {
            font-size: 18px;
            line-height: 1.7;
            color: #d1d5db;
        }

        a {
            color: #60a5fa;
            font-weight: bold;
        }

        .coming {
            margin-top: 30px;
            display: inline-block;
            padding: 12px 24px;
            border-radius: 999px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.12);
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #f3f4f6;
        }

        .contact {
            margin-top: 28px;
            font-size: 16px;
            color: #d1d5db;
        }

        .footer {
            margin-top: 35px;
            font-size: 13px;
            color: #9ca3af;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            p {
                font-size: 16px;
            }

            .container {
                padding: 25px;
            }

            .contact {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Mirror Trading Manager</h1>

        <p>
            We are currently building our new website.<br>
            A fresh and improved experience will be released soon.
        </p>

        <div class="coming">
            Coming Soon
        </div>

        <div class="contact">
            For subscription enquiries, contact me directly: <a href="https://antonnel.net" target="_blank">antonnel.net</a>
        </div>

        <div class="footer">
            © 2021-2026 Anton Nel. All rights reserved.
        </div>

    </div>

</body>
</html>
